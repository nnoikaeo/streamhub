name: Preview Deploy (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC — purge stale preview channels

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  # ── Scheduled purge: delete all preview channels (runs daily) ─────────────
  purge:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete all preview channels
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $RUNNER_TEMP/firebase-sa.json
          npx firebase-tools@latest hosting:channel:list \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --json | \
          node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const channels = (data.result?.channels || [])
              .filter(c => !['live'].includes(c.name.split('/').pop()));
            channels.forEach(c => process.stdout.write(c.name.split('/').pop() + '\n'));
          " | while read ch; do
            npx firebase-tools@latest hosting:channel:delete "$ch" \
              --project ${{ secrets.FIREBASE_PROJECT_ID }} \
              --force || true
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

  # ── Cleanup: delete preview channel when PR is closed/merged ──────────────
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Delete Firebase preview channel
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $RUNNER_TEMP/firebase-sa.json
          CHANNEL="pr${{ github.event.pull_request.number }}-${{ github.head_ref }}"
          npx firebase-tools@latest hosting:channel:delete "$CHANNEL" \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --force \
            || echo "Channel not found or already deleted, skipping."
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

  # ── Preview deploy: build + deploy on open/push ───────────────────────────
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Nuxt (Firebase preset)
        env:
          NUXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NUXT_PUBLIC_FIREBASE_API_KEY }}
          NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NUXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NUXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NUXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NUXT_PUBLIC_FIREBASE_APP_ID }}
          NUXT_PUBLIC_USE_FIRESTORE: 'true'
          NUXT_PUBLIC_USE_JSON_MOCK: 'false'
          # Prevent firebase-functions SDK from hitting GCP metadata server during
          # Nitro prerender. In GitHub Actions (Azure infra), 169.254.169.254 responds
          # as Azure IMDS (wrong format) causing a multi-minute hang.
          FIREBASE_CONFIG: '{}'
          NO_GCE_CHECK: 'true'
        run: npm run build

      - name: Prepare Cloud Function package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const deps = pkg.dependencies || {};
            const removed = [];
            Object.keys(deps).forEach(k => {
              if (k === 'sharp' || k.startsWith('@img/') || deps[k].startsWith('file:')) {
                removed.push(k);
                delete deps[k];
              }
            });
            pkg.dependencies = deps;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Removed:', removed.join(', '));
          "
          echo "ignore-scripts=true" > .npmrc
          rm -rf node_modules
          npm install
        working-directory: .output/server

      - name: Deploy Cloud Functions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $RUNNER_TEMP/firebase-sa.json
          npx firebase-tools deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

      - name: Deploy preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          expires: 3d
